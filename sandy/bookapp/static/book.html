<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Last Root</title>

<style>

body{
  background:#d9d9d9;
  font-family:Arial, Helvetica, sans-serif;
}

.book{
  width:420px;
  margin:40px auto;
  border:2px solid #333;
  background:white;
  box-shadow:0 5px 12px rgba(0,0,0,0.4);
}

.cover{
  text-align:center;
}

.cover p{
  text-align:left;
  padding:10px;
  font-size:14px;
}

.cover hr{
  border:1px solid goldenrod;
}

.cover h1{
  color:#6b5222;
  margin-top:10px;
}

.desc{
  padding:10px 30px;
  color:#6b5222;
  font-weight:normal;
  line-height:1.6;
}

.image-container{
  position:relative;
}

.bg-image{
  width:100%;
  display:block;
}

.aut-img{
  width:90px;
  border-radius:10px;
  position:absolute;
  bottom:20px;
  right:20px;
  border:3px solid white;
}

.author{
  position:absolute;
  bottom:25px;
  left:20px;
  color:white;
  font-weight:bold;
}

</style>
</head>

<body>

<section class="book">

<div class="cover">

<p>The Last Root</p>
<hr>

<h1>Success Through Persistence</h1>

<h3 class="desc">
Success is built on patience, courage, and persistence.
Even when storms try to shake us, the strongest roots
hold us firm. True success comes to those who continue
to grow, learn, and rise after every challenge.
</h3>

<div class="image-container">

<img src="book.png" class="bg-image">

<h3 class="author">
Authored By <br>
SANTHOSH KUMAR A
</h3>

<img src="my photo.png" class="aut-img">

</div>

</div>

</section>

</body>
</html>
